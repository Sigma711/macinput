name: Bug report
description: Report a reproducible defect in macinput
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, confirm the issue is reproducible and includes the environment details needed to debug it.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: A clear and short description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps so someone else can reproduce it.
      placeholder: |
        1. Start the server with ...
        2. Call tool ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include the relevant runtime details.
      placeholder: |
        macOS version:
        Python version:
        macinput version or commit:
        MCP host:
        Transport:
        Permission state:
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs and screenshots
      description: Add relevant logs, stack traces, or screenshots.
      render: shell
    validations:
      required: false
